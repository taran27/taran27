<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Taranjot Sandhu — Principal Engineer">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="55%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="240" fill="url(#bg)"/>

  <path fill="rgba(255,255,255,0.07)">
    <animate attributeName="d" dur="9s" repeatCount="indefinite"
      values="M0,170 Q200,130 400,170 T800,170 T1200,170 L1200,240 L0,240 Z;
              M0,150 Q200,190 400,150 T800,150 T1200,150 L1200,240 L0,240 Z;
              M0,170 Q200,130 400,170 T800,170 T1200,170 L1200,240 L0,240 Z"/>
  </path>

  <path fill="rgba(255,255,255,0.12)">
    <animate attributeName="d" dur="6s" repeatCount="indefinite"
      values="M0,200 Q300,170 600,200 T1200,200 L1200,240 L0,240 Z;
              M0,185 Q300,215 600,185 T1200,185 L1200,240 L0,240 Z;
              M0,200 Q300,170 600,200 T1200,200 L1200,240 L0,240 Z"/>
  </path>

  <text x="600" y="105" text-anchor="middle" fill="#ffffff" font-size="68" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" letter-spacing="-1.5">
    Taranjot Sandhu
    <animate attributeName="opacity" from="0" to="1" dur="1.2s" fill="freeze"/>
  </text>
  <text x="600" y="148" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="20" font-weight="500" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" letter-spacing="0.5">
    Principal Engineer  •  Insurance  •  Fintech  •  Bay Area
    <animate attributeName="opacity" from="0" to="1" dur="1.6s" fill="freeze"/>
  </text>
</svg>
